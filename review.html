<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Take-off — Project Review</title>
<!-- Zoho Creator widget SDK — verified from match-hub-widget (do not change). -->
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<!--
  LIVE approval page (build 3b). Renders a real take-off result {rows, import_csv, synopsis}.
  Data source, in order: window.TAKEOFF_RESULT  →  sessionStorage 'takeoff_result'
  (set by the upload widget)  →  built-in SAMPLE (so it opens standalone for design review).
  Approve & Submit commits the BOM via submitToZoho (3a); other section-writes are WIRE-stubbed.
-->
<style>
  :root{
    --blue:#5F94CE; --ink:#1f2a37; --mut:#667; --line:#e3e6ea;
    --grn:#2e7d32; --grnbg:#e8f5e9; --ylw:#b45309; --ylwbg:#fff7ed;
    --red:#b91c1c; --redbg:#fdeeee;
  }
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',system-ui,sans-serif;margin:0;padding:24px;background:#eef1f5;color:var(--ink);}
  .wrap{max-width:1100px;margin:0 auto;}
  .appbar{max-width:1100px;margin:0 auto 14px;display:flex;align-items:center;gap:10px;padding:2px;}
  .appbar .brand{font-weight:800;font-size:16px;color:var(--blue);letter-spacing:.2px;}
  .appbar .page{font-size:13px;color:var(--mut);border-left:1px solid var(--line);padding-left:10px;}
  .applybtn{font-size:11px;color:#fff;background:var(--blue);border:0;border-radius:5px;padding:2px 9px;cursor:pointer;margin-left:4px;}
  .applybtn:hover{opacity:.9;}
  .applybtn:disabled{opacity:.5;cursor:default;}
  .busy{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--blue);color:#fff;text-align:center;
        padding:11px;font-size:14px;font-weight:600;display:none;box-shadow:0 2px 10px rgba(0,0,0,.18);}
  .busy.show{display:block;}
  .busy.err{background:var(--red);}
  .busy.ok{background:var(--grn);}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:14px;overflow:hidden;}
  .card h2{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:0;padding:13px 18px;border-bottom:1px solid var(--line);background:#fafbfc;}
  .card h2 .lt{text-transform:none;letter-spacing:0;font-weight:400;color:var(--mut);}
  .card .body{padding:16px 18px;}
  .hero{background:linear-gradient(180deg,#fff,#f7f9fc);} .hero .body{padding:20px 18px;}
  .hero h1{margin:0 0 4px;font-size:20px;} .hero .type{color:var(--mut);font-size:13px;margin-bottom:14px;}
  .meta{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 11px;color:#334;}
  .conf{float:right;font-weight:700;font-size:13px;padding:5px 12px;border-radius:20px;}
  .c-hi{background:var(--grnbg);color:var(--grn);} .c-md{background:var(--ylwbg);color:var(--ylw);} .c-lo{background:var(--redbg);color:var(--red);}
  .stream{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed #eef1f4;} .stream:last-child{border-bottom:0;}
  .stream .tag{flex:0 0 92px;font-weight:600;font-size:12px;}
  .tag.fab{color:var(--blue);} .tag.buy{color:var(--ylw);} .tag.oth{color:var(--mut);} .tag.snd{color:var(--grn);}
  .stream .items{font-size:13px;color:#2b3340;}
  .dec{padding:12px 0;border-bottom:1px dashed #eef1f4;} .dec:last-child{border-bottom:0;}
  .dec .q{font-size:14px;font-weight:600;margin-bottom:2px;} .dec .why{font-size:12px;color:var(--mut);margin-bottom:8px;}
  .opts{display:flex;gap:8px;flex-wrap:wrap;}
  .opt{font-size:13px;border:1px solid var(--line);border-radius:7px;padding:6px 12px;cursor:pointer;background:#fff;user-select:none;transition:.12s;}
  .opt:hover{border-color:var(--blue);} .opt.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
  .opt.rec::after{content:" ★";color:#f2c14e;font-size:11px;} .opt.sel.rec::after{color:#fff;}
  .undec{box-shadow:inset 3px 0 0 var(--ylw);padding-left:10px;border-radius:3px;}
  .decnote{font-size:12px;color:var(--ylw);margin-top:6px;}
  .twoup{display:grid;grid-template-columns:1fr 1fr;gap:14px;} @media(max-width:640px){.twoup{grid-template-columns:1fr;}}
  details{font-size:13px;} details summary{cursor:pointer;font-weight:600;padding:4px 0;}
  details ul{margin:6px 0 0;padding-left:18px;color:#2b3340;} details li{margin:4px 0;}
  .src{color:var(--mut);font-size:11px;}
  .comp{display:flex;gap:10px;align-items:flex-start;font-size:13px;margin-bottom:8px;} .comp .ok{color:var(--grn);font-weight:700;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line);}
  td{padding:7px 8px;border-bottom:1px solid #f1f3f5;}
  tr.lo td{background:var(--redbg);} tr.md td{background:var(--ylwbg);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
  .d-hi{background:var(--grn);} .d-md{background:var(--ylw);} .d-lo{background:var(--red);}
  .galv{font-size:10px;background:#eef6ee;color:var(--grn);border-radius:4px;padding:1px 5px;}
  tr.grp-comp td{background:#eef2f7;color:#1f3a5f;font-weight:700;font-size:13px;padding:9px 12px;border-top:2px solid #cdd8e6;border-bottom:1px solid #d7e0ec;}
  tr.grp-draw td{background:#f7f9fb;color:#46566b;font-weight:600;font-size:12px;padding:5px 12px 5px 24px;border-bottom:1px solid #eef1f4;}
  .grp-meta{font-weight:500;color:#8493a4;font-size:11px;margin-left:8px;}
  .pillbtn{font-size:11px;color:var(--blue);border:1px solid #cfe0f2;background:#f3f8fd;border-radius:5px;padding:1px 7px;margin-left:6px;cursor:pointer;}
  .ai{display:flex;gap:8px;} .ai input{flex:1;padding:10px 12px;border:1px solid #cdd3da;border-radius:8px;font-size:13px;}
  .btn{border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:13px;}
  .btn.ghost{background:#fff;border:1px solid var(--blue);color:var(--blue);} .btn.go{background:var(--blue);color:#fff;} .btn.go:disabled{opacity:.45;cursor:not-allowed;}
  .bar{position:sticky;bottom:0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,.05);}
  .bar .left{font-size:13px;color:var(--mut);} .bar .left b{color:var(--ink);}
  .commit{margin-top:10px;font-size:13px;background:var(--grnbg);border:1px solid #bfe3c4;border-radius:8px;padding:12px 14px;display:none;} .commit ul{margin:8px 0 0;padding-left:18px;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #cdd3da;border-top-color:var(--blue);border-radius:50%;animation:s .8s linear infinite;vertical-align:-2px;margin-right:6px;} @keyframes s{to{transform:rotate(360deg);}}
  .foot{text-align:center;color:#9aa6b2;font-size:11px;margin:6px 0 24px;}
  @media print {
    body{background:#fff;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .wrap,.appbar{max-width:100%;}
    #printBtn,#newRun,.bar,.busy,.commit,#reviseCard,.applybtn,.pillbtn{display:none !important;}
    .card{box-shadow:none;break-inside:avoid;}
    input[type=number]{border:none;padding:0;width:auto;background:transparent;font-size:12.5px;}
  }
</style>
</head>
<body>
<div id="busy" class="busy"></div>
<div class="appbar"><span class="brand">Material Compass</span><span class="page">AI Take-off · Project Review</span><span id="saveInd" style="font-size:11px;color:var(--mut);margin-left:12px"></span>
  <a id="addBtn" href="#" onclick="document.getElementById('addFile').click();return false;" style="margin-left:auto;font-size:12px;color:var(--blue);text-decoration:none;font-weight:600">➕ Add drawings</a>
  <a id="printBtn" href="#" onclick="printAll();return false;" style="margin-left:14px;font-size:12px;color:var(--blue);text-decoration:none;font-weight:600">🖨 Print</a>
  <a id="newRun" href="#" style="margin-left:14px;font-size:12px;color:var(--blue);text-decoration:none;font-weight:600">↻ New take-off</a></div>
<input type="file" id="addFile" accept="application/pdf" multiple style="display:none" onchange="addDrawings(this)">
<div class="wrap" id="wrap"><div class="card"><div class="body">Loading take-off…</div></div></div>

<script>
  // ---- CONFIG (CONFIRM link names — same Z block as index.html) --------------
  const RAILWAY_URL = "https://material-compass-nesting-app-production.up.railway.app";
  const VERSION = "v0.22 · 2026-06-03";  // bump on every push so you can verify what loaded (Pages CDN caches ~10min)
  console.log("Material Compass review.html " + VERSION);
  const Z = {
    APP:"type-formsheet-2-18-21",            // app link name
    IMPORT_FORM:"Import_BOM_Form",           // CSV Import Tool form (addRecord target)
    IMPORT_REPORT:"Import_BOM_Form_Report",  // its report (uploadFile / updateRecord target)
    REVIEW_PAGE:"https://customer.materialcompassportal.com/#Page:BOM_Staging_Review_Page", // staging review (same page the workflow opens)
    MODE_VALUE:"Append",                     // BOM Import Mode choice — Append keeps existing rows (Replace would wipe them)
    F:{project:"Project_ID",mfg:"MFG_Client_Form",mode:"BOM_Import_Mode",file:"BOM_CSV_File",run:"Run_Import"},
  };

  // ---- params (project_id / manufacturer_id) ---------------------------------
  function getParams(){ const q=new URLSearchParams(location.search);
    return { project_id:q.get("project_id"), manufacturer_id:q.get("manufacturer_id") }; }
  let params = getParams();
  if (window.ZOHO && ZOHO.CREATOR && ZOHO.CREATOR.init) {
    ZOHO.CREATOR.init().then(()=>{ try{ const p=ZOHO.CREATOR.UTIL.getQueryParams();
      params={project_id:p.project_id||params.project_id, manufacturer_id:p.manufacturer_id||params.manufacturer_id};}catch(e){} });
  }

  // ---- data source + persistence ---------------------------------------------
  // Results are saved to localStorage keyed by project, so closing & reopening this
  // page (same browser) restores the last take-off instead of losing a paid run.
  function lsKey(){ return params.project_id ? ("mc_takeoff_"+params.project_id) : null; }
  // window + sessionStorage are GLOBAL (not project-keyed) — a result from another project must
  // never be reused here, or you'd open Schutte and see Alden. Every result is tagged __project.
  function sameProj(R){ return !!(R && params.project_id && String(R.__project||"")===String(params.project_id)); }
  function loadResult(){
    if (window.TAKEOFF_RESULT && sameProj(window.TAKEOFF_RESULT)) return window.TAKEOFF_RESULT;
    try { const s=sessionStorage.getItem("takeoff_result"); if(s){ const R=JSON.parse(s); if(sameProj(R)) return R; } } catch(e){}
    try { const k=lsKey(); if(k){ const s=localStorage.getItem(k); if(s) return JSON.parse(s); } } catch(e){}  // localStorage is already project-keyed
    return SAMPLE;
  }
  function saveResult(result){
    if(result && params.project_id) result.__project = params.project_id;  // tag so it can't leak across projects
    window.TAKEOFF_RESULT = result;
    if(result && result.__demo) return;   // never persist demo/sample data (was polluting localStorage)
    try { sessionStorage.setItem("takeoff_result", JSON.stringify(result)); } catch(e){}
    try { const k=lsKey(); if(k) localStorage.setItem(k, JSON.stringify(result)); } catch(e){}
    scheduleZohoSave();   // also persist to the project record in Zoho (debounced)
  }
  // ---- durable save to Zoho (per project), debounced ----
  let _zohoTimer=null;
  function setSaveInd(txt,color){ const el=document.getElementById("saveInd"); if(el){ el.textContent=txt; el.style.color=color||"var(--mut)"; } }
  function scheduleZohoSave(){ if(_zohoTimer) clearTimeout(_zohoTimer); _zohoTimer=setTimeout(doZohoSave, 2500); }
  async function doZohoSave(){
    const R=loadResult();
    if(!R || R.__demo || !params.project_id || !Array.isArray(R.rows) || !R.rows.length) return;
    setSaveInd("saving…","var(--mut)");
    const pkg={ rows:R.rows, synopsis:R.synopsis, notes:R.notes, cost_usd:R.cost_usd };
    try{
      const r=await fetch(RAILWAY_URL+"/api/takeoff/save",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({project_id:params.project_id, package:pkg})});
      const d=await r.json();
      setSaveInd(d.ok?"💾 saved to project":"⚠ save failed", d.ok?"var(--grn)":"var(--red)");
    }catch(e){ setSaveInd("⚠ save failed","var(--red)"); }
  }
  function haveLive(){ try{
    if(window.TAKEOFF_RESULT && sameProj(window.TAKEOFF_RESULT)) return true;
    const s=sessionStorage.getItem("takeoff_result"); if(s && sameProj(JSON.parse(s))) return true;
    const k=lsKey(); if(k && localStorage.getItem(k)) return true;
  }catch(e){} return false; }

  // ---- helpers ---------------------------------------------------------------
  const esc = (s)=>String(s==null?"":s).replace(/</g,"&lt;");
  const arr = (a)=>Array.isArray(a)?a:[];
  const confClass=(c)=> c>=0.8?"hi":c>=0.5?"md":"lo";
  const confBadge=(c)=> '<span class="conf c-'+confClass(c)+'">'+Math.round((c||0)*100)+'% confident</span>';
  const splitFt=(n)=>{const r=Number(n)||0;const ft=Math.max(0,Math.floor(r));return ft+"'"+Math.round((r-ft)*12)+'"';};
  // decimal feet → feet-inches with fractions (nearest 1/16): 0.8→9-5/8", 24→24'-0", 6.33→6'-3-15/16"
  function fmtFtIn(ftVal){
    let v=Number(ftVal)||0; if(v<0) v=0;
    let feet=Math.floor(v);
    let s=Math.round((v-feet)*192);   // 1/16-inch units in the remaining foot (12*16)
    feet+=Math.floor(s/192); s=s%192;
    let inch=Math.floor(s/16), f16=s%16, frac="";
    if(f16>0){ let n=f16,d=16; while(n%2===0){n/=2;d/=2;} frac=n+"/"+d; }
    const inchStr=(inch>0||frac)?(inch+(frac?("-"+frac):"")+'"'):"";
    if(feet>0&&inchStr) return feet+"'-"+inchStr;
    if(feet>0) return feet+"'-0\"";
    return inchStr||'0"';
  }
  // Plates/sheets carry width×length; linear members carry length only.
  function dimStr(r){ return r.width_ft ? (fmtFtIn(r.width_ft)+" × "+fmtFtIn(r.length_ft)) : fmtFtIn(r.length_ft); }

  let DECISIONS = [];   // working copy with .sel
  let CONFLICTS = [];   // for the per-conflict Apply buttons
  let BOM_EXPANDED = false;  // BOM table: show first 8 vs all + editable

  function render(){
    const R = loadResult();
    const rows = arr(R.rows);
    const s = R.synopsis || {};
    DECISIONS = arr(s.decisions).map((d,i)=>({
      id:"dec"+i, item:d.item||"(decision)",
      where:d.where||"", why:d.why_flagged||"", options:arr(d.options).length?d.options:["Include","Skip"],
      rec:d.ai_recommendation||"", sel:(d.selected!=null?d.selected:(d.ai_recommendation||null)),
    }));
    const sw = s.scope_of_work||{}, t=s.totals||{}, conf=s.confidence||{};
    const fab = rows.filter(r=>(Number(r.quantity)||0)>0);
    const gaps = arr(s.gaps), conflicts=arr(s.conflicts), comp=arr(s.compliance);
    CONFLICTS = conflicts;
    const overall = conf.overall!=null?conf.overall:0.7;

    const streams = [
      ["fab","Fabricate",arr(sw.fabricate)],["buy","Buyout",arr(sw.buyout)],
      ["oth","By others",arr(sw.by_others)],["snd","Send-out",arr(sw.send_out)],
    ].filter(x=>x[2].length);

    const editable = BOM_EXPANDED;
    const NC = editable ? 7 : 6;  // table columns (Sheet now lives in the drawing group header)
    const fabIdx=[]; rows.forEach(function(r,idx){ if((Number(r.quantity)||0)>0) fabIdx.push(idx); });

    // Group fab rows by Component → Drawing (source_sheet), preserving first-seen order.
    const gKey=function(v){ return (v==null?'':String(v).trim()); };
    const compOrder=[], compMap={};
    fabIdx.forEach(function(idx){
      const r=rows[idx];
      const cN=gKey(r.component)||'— Unassigned —';
      const dN=gKey(r.source_sheet)||'— No sheet —';
      if(!compMap[cN]){ compMap[cN]={dOrder:[],dMap:{}}; compOrder.push(cN); }
      const g=compMap[cN];
      if(!g.dMap[dN]){ g.dMap[dN]=[]; g.dOrder.push(dN); }
      g.dMap[dN].push(idx);
    });
    const sumQty=function(ids){ return ids.reduce(function(a,i){ return a+(Number(rows[i].quantity)||0); },0); };

    const memberRow=function(idx){
      const r=rows[idx], c=Number(r.confidence)||0, cls=confClass(c);
      const qtyCell = editable
        ? '<input type="number" min="0" value="'+(Number(r.quantity)||0)+'" style="width:56px;padding:3px 5px;border:1px solid #cdd3da;border-radius:5px;font-size:12px;" onchange="editQty('+idx+',this.value)">'
        : esc(r.quantity);
      return '<tr class="'+(cls==="hi"?"":cls)+'">'+
        '<td><span class="dot d-'+cls+'"></span>'+c.toFixed(2)+'</td>'+
        '<td>'+esc(r.form_type)+'</td>'+
        '<td>'+esc(r.size)+(r.galvanized?' <span class="galv">galv</span>':'')+'</td>'+
        '<td>'+esc(r.specification)+'</td><td>'+qtyCell+'</td>'+
        '<td style="white-space:nowrap">'+dimStr(r)+'</td>'+
        (editable?'<td><button class="applybtn" style="background:var(--red);padding:1px 8px" title="Remove row" onclick="removeRow('+idx+')">✕</button></td>':'')+
        '</tr>';
    };
    const bomRows = compOrder.map(function(cN){
      const g=compMap[cN];
      const cIds=[].concat.apply([], g.dOrder.map(function(d){ return g.dMap[d]; }));
      let html='<tr class="grp-comp"><td colspan="'+NC+'">▸ '+esc(cN)+
        ' <span class="grp-meta">'+cIds.length+' item'+(cIds.length===1?'':'s')+' · '+sumQty(cIds)+' qty</span></td></tr>';
      g.dOrder.forEach(function(dN){
        const ids=g.dMap[dN];
        html+='<tr class="grp-draw"><td colspan="'+NC+'">📄 '+esc(dN)+
          ' <span class="grp-meta">'+ids.length+' item'+(ids.length===1?'':'s')+' · '+sumQty(ids)+' qty</span></td></tr>'+
          ids.map(memberRow).join("");
      });
      return html;
    }).join("");

    const isLive = haveLive();
    document.getElementById("wrap").innerHTML =
      (isLive ? '' :
        '<div class="card" style="background:#fff7ed;border-color:#fcd9a8;"><div class="body" style="padding:12px 16px;color:#b45309;font-size:13px;">'+
        '<b>⚠ Demo data</b> — this is a built-in sample, <b>not your project</b>. Open the take-off widget, upload your drawings, and click <b>Run take-off</b> to see your real project here.</div></div>') +
      // header
      '<div class="card hero"><div class="body">'+ confBadge(overall) +
        '<h1>'+esc(s.project?.name||"AI Take-off")+'</h1>'+
        '<div class="type">'+esc(s.project?.type||"")+(s.project?.summary?" — "+esc(s.project.summary):"")+'</div>'+
        '<div class="meta">'+
          '<span class="chip">📄 '+(arr(s.project?.sheets_read).length||"?")+' sheets/specs</span>'+
          '<span class="chip">🧱 '+fab.length+' fab rows</span>'+
          (t.est_weight_lb?'<span class="chip">⚖ ~'+Number(t.est_weight_lb).toLocaleString()+' lb</span>':'')+
          (R.cost_usd!=null?'<span class="chip">💲 $'+R.cost_usd+'</span>':'')+
          (gaps.length?'<span class="chip">◷ '+gaps.length+' gaps</span>':'')+
        '</div></div></div>'+

      // scope
      (streams.length?'<div class="card"><h2>▸ Scope of Work</h2><div class="body">'+
        streams.map(([k,lbl,items])=>'<div class="stream"><div class="tag '+k+'">'+lbl+'</div>'+
          '<div class="items">'+items.map(esc).join(" · ")+
          (k==="buy"?' <span class="pillbtn" onclick="alert(\'Mock: builds the RFQ / outsource subform from these buyout items.\')">→ build RFQ</span>':'')+
          '</div></div>').join("")+'</div></div>':'')+

      // decisions
      (DECISIONS.length?'<div class="card"><h2>⚠ Decisions — your call <span id="decCount" style="color:var(--ylw);font-weight:700;"></span></h2><div class="body" id="decisions"></div></div>':'')+

      // gaps + conflicts
      ((gaps.length||conflicts.length)?'<div class="card"><h2>◷ Gaps &amp; ⚡ Conflicts</h2><div class="body twoup">'+
        (gaps.length?'<details open><summary>◷ Gaps to verify ('+gaps.length+')</summary><ul>'+
          gaps.map(g=>'<li>'+esc(g.item)+(g.where?' <span class="src">'+esc(g.where)+'</span>':'')+
          (g.suggested_action?'<br><span class="src">→ '+esc(g.suggested_action)+'</span>':'')+'</li>').join("")+'</ul></details>':'<div></div>')+
        (conflicts.length?'<details open><summary>⚡ Conflicts ('+conflicts.length+')</summary><ul>'+
          conflicts.map((c,i)=>'<li><b>'+esc(c.topic)+'</b>'+
          (c.drawing_says?' — drawing: '+esc(c.drawing_says):'')+(c.spec_says?' · spec: '+esc(c.spec_says):'')+
          (c.recommendation?'<br><span class="src">→ '+esc(c.recommendation)+'</span> <button class="applybtn" onclick="applyConflict('+i+')">Apply</button>':'')+'</li>').join("")+'</ul></details>':'<div></div>')+
        '</div></div>':'')+

      // compliance
      (comp.length?'<div class="card"><h2>✓ Compliance &amp; finish</h2><div class="body">'+
        comp.map(c=>'<div class="comp"><span class="ok">'+esc(c.topic)+'</span><span class="src">'+esc(c.note)+'</span></div>').join("")+
        '</div></div>':'')+

      // BOM
      '<div class="card"><h2>▸ Bill of Materials <span class="lt">— '+fab.length+' rows, grouped by component → drawing</span></h2><div class="body" style="padding:0;">'+
        '<table><thead><tr><th>Conf</th><th>Form</th><th>Material</th><th>Spec</th><th>Qty</th><th>Dimensions</th>'+(editable?'<th></th>':'')+'</tr></thead><tbody>'+
        (bomRows||'<tr><td colspan="'+NC+'" style="padding:14px;color:var(--mut)">No quantified rows.</td></tr>')+'</tbody></table>'+
        ((fab.length>0)?'<div style="padding:10px 18px;font-size:12px;color:var(--mut)">'+
          (editable
            ? 'Editing all '+fab.length+' rows — change a Qty or remove a row (✕). <span class="pillbtn" onclick="toggleBom()">done</span> &nbsp;·&nbsp; form/spec/size are best changed via “Tell the AI” below.'
            : 'Grouped by component (▸), then drawing (📄) — review one sheet at a time. <span class="pillbtn" onclick="toggleBom()">edit rows</span>')+
        '</div>':'')+
      '</div></div>'+

      // tell-the-AI (3c)
      '<div class="card" id="reviseCard"><h2>💬 Tell the AI to revise</h2><div class="body">'+
        '<div class="ai"><input id="aiInput" placeholder=\'e.g. "galvanize all exterior angles per spec, drop the davit cranes, add 4 bollards @ 6ft"\' />'+
        '<button class="btn ghost" id="reviseBtn" onclick="doRevise()">Revise</button></div>'+
        '<div id="aiEcho" style="font-size:12px;color:var(--mut);margin-top:8px;"></div></div></div>'+

      // submit bar
      '<div class="bar"><div class="left" id="barLeft"></div>'+
        '<div style="display:flex;gap:8px;align-items:center">'+
          '<button class="btn ghost" onclick="downloadBom()">↓ BOM CSV</button>'+
          '<button class="btn go" id="approve" onclick="approve()">Approve &amp; Submit Project →</button>'+
        '</div></div>'+
      '<div class="commit" id="commit"></div>'+
      '<div class="foot">Material Compass · AI Take-off · '+(haveLive()?'live':'sample data')+' · '+VERSION+'</div>';

    renderDecisions();
  }


  function renderDecisions(){
    const box=document.getElementById("decisions");
    if(box){
      box.innerHTML = DECISIONS.map(d=>{
        const undec=d.sel==null;
        return '<div class="dec '+(undec?'undec':'')+'">'+
          '<div class="q">'+esc(d.item)+'</div>'+
          '<div class="why">'+esc(d.why)+(d.where?' <span class="src">· '+esc(d.where)+'</span>':'')+'</div>'+
          '<div class="opts">'+d.options.map(o=>'<span class="opt '+(d.sel===o?'sel ':'')+(d.rec===o?'rec':'')+'" onclick="pick(\''+d.id+'\',\''+esc(o).replace(/\x27/g,"")+'\')">'+esc(o)+'</span>').join("")+'</div>'+
          (undec?'<div class="decnote">★ needs your decision.</div>':'')+'</div>';
      }).join("");
    }
    const made=DECISIONS.filter(d=>d.sel!=null).length, left=DECISIONS.length-made;
    const dc=document.getElementById("decCount"); if(dc) dc.textContent = DECISIONS.length?(left?'('+left+' need a decision)':'(all set ✓)'):'';
    const bl=document.getElementById("barLeft");
    if(bl) bl.innerHTML = DECISIONS.length
      ? '<b>'+made+'</b> of <b>'+DECISIONS.length+'</b> decisions · '+(left?'<span style="color:var(--ylw)">'+left+' undecided</span>':'<span style="color:var(--grn)">ready ✓</span>')
      : '<span style="color:var(--grn)">ready ✓</span>';
    const ap=document.getElementById("approve"); if(ap) ap.disabled = left>0;
  }
  function pick(id,v){
    const d=DECISIONS.find(function(x){return x.id===id;}); if(!d) return;
    d.sel=v; renderDecisions();
    const idx=parseInt(String(id).replace("dec",""),10);
    const R=loadResult();
    if(R && R.synopsis && Array.isArray(R.synopsis.decisions) && R.synopsis.decisions[idx]){ R.synopsis.decisions[idx].selected=v; saveResult(R); }
  }

  // ---- BOM expand + inline edit ----------------------------------------------
  function toggleBom(){ BOM_EXPANDED=!BOM_EXPANDED; render(); }
  // Print the full package — expand the BOM first so every row is on the printout.
  function printAll(){ BOM_EXPANDED=false; render(); setTimeout(function(){ window.print(); }, 200); }

  // ---- Add more drawings to THIS take-off (additive — merges, doesn't redo) ------------------
  function readB64(f){ return new Promise(function(res,rej){ const r=new FileReader(); r.onerror=function(){rej(new Error("read failed: "+f.name));}; r.onload=function(){ res(String(r.result).split(",")[1]); }; r.readAsDataURL(f); }); }
  function mergeList(a,b){ return (Array.isArray(a)?a:[]).concat(Array.isArray(b)?b:[]); }
  function mergeAddon(cur, addon){
    const out = JSON.parse(JSON.stringify(cur || {}));
    out.rows = mergeList(cur.rows, addon.rows);
    const cs = (cur && cur.synopsis) || {}, as = (addon && addon.synopsis) || {};
    const sw1 = cs.scope_of_work || {}, sw2 = as.scope_of_work || {};
    const proj = cs.project || as.project || {};
    out.synopsis = {
      project: Object.assign({}, proj, { sheets_read: mergeList(proj.sheets_read, as.project && as.project.sheets_read) }),
      scope_of_work: {
        fabricate: mergeList(sw1.fabricate, sw2.fabricate),
        buyout:    mergeList(sw1.buyout, sw2.buyout),
        by_others: mergeList(sw1.by_others, sw2.by_others),
        send_out:  mergeList(sw1.send_out, sw2.send_out),
      },
      decisions:  mergeList(cs.decisions, as.decisions),
      gaps:       mergeList(cs.gaps, as.gaps),
      conflicts:  mergeList(cs.conflicts, as.conflicts),
      compliance: mergeList(cs.compliance, as.compliance),
      totals:     Object.assign({}, cs.totals),
      confidence: cs.confidence || as.confidence,
    };
    out.cost_usd = (Number(cur.cost_usd) || 0) + (Number(addon.cost_usd) || 0);
    return out;
  }
  async function addDrawings(input){
    const files = [].slice.call(input.files).filter(function(f){ return f.type === "application/pdf"; });
    input.value = "";
    if(!files.length || window.__revising) return;
    window.__revising = true;
    document.querySelectorAll(".applybtn,#reviseBtn,#addBtn").forEach(function(b){ b.disabled = true; });
    let secs=0; const fmt=function(){ const m=Math.floor(secs/60),s=secs%60; return m+":"+(s<10?"0":"")+s; };
    const lbl = files.length + " more drawing" + (files.length>1?"s":"");
    setBusy("&#10227; Reading "+lbl+"… 0:00 &nbsp;·&nbsp; please wait, don't close");
    const tick=setInterval(function(){ secs++; setBusy("&#10227; Reading "+lbl+"… "+fmt()+" &nbsp;·&nbsp; please wait, don't close"); }, 1000);
    const stop=function(){ clearInterval(tick); window.__revising=false; };
    const reenable=function(){ document.querySelectorAll(".applybtn,#reviseBtn,#addBtn").forEach(function(b){ b.disabled=false; }); };
    try{
      const pdfs=[]; for(const f of files){ pdfs.push(await readB64(f)); }
      const r=await fetch(RAILWAY_URL+"/api/takeoff",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({project_id:params.project_id,manufacturer_id:params.manufacturer_id,pdfs:pdfs,model:"sonnet"})});
      const data=await r.json();
      if(!r.ok||data.ok===false){ stop(); reenable(); setBusy("⚠ Add failed: "+esc(data.error||("HTTP "+r.status)),"err"); clearBusy(8000); return; }
      const cur=loadResult();
      const merged=mergeAddon(cur, data);
      recomputeCsv(merged); saveResult(merged);
      stop(); render(); window.scrollTo({top:0,behavior:"smooth"});
      const added=(data.rows||[]).filter(function(x){return (Number(x.quantity)||0)>0;}).length;
      const total=merged.rows.filter(function(x){return (Number(x.quantity)||0)>0;}).length;
      setBusy("✓ Added "+added+" rows from "+files.length+" file"+(files.length>1?"s":"")+" — "+total+" total now (cost $"+(data.cost_usd!=null?data.cost_usd:"?")+")","ok"); clearBusy(8000);
    }catch(e){ stop(); reenable(); setBusy("⚠ Error: "+esc(e.message),"err"); clearBusy(8000); }
  }
  function _cell(v){ return String(v==null?"":v).replace(/[,\r\n]+/g," ").trim(); }
  function _pct(c){ const n=Number(c); return Number.isFinite(n)?String(Math.round(n*100)):""; }
  function _sft(n){ const raw=Number(n)||0; const ft=Math.max(0,Math.floor(raw)); const inch=Math.round((raw-ft)*12); return inch>=12?[ft+1,0]:[ft,inch]; }
  // Rebuild the import CSV from the (possibly edited) rows — keeps Approve/export in sync with edits.
  function buildImportCsvJS(rows){
    const H=["MATERIAL COMPASS - BOM Import Template (AI Take-off)","Generated by AI Take-off - review in BOM Staging",
      "Tag,Component,Drawing Number,Form Type,Mat Type,Specification,Material,QTY,FT(L),INCH(L),FT(W),INCH(W),Galv,Surface Area,Confidence",
      "blue = lookup ; green = direct entry ; * = required","",""];
    const out=H.slice();
    (rows||[]).filter(function(r){ return (Number(r.quantity)||0)>0; }).forEach(function(r,i){
      const L=_sft(r.length_ft), W=_sft(r.width_ft);
      const tag=_cell(r.member_mark)||("AI-"+String(i+1).padStart(3,"0"));
      out.push([tag,_cell(r.component),_cell(r.source_sheet),_cell(r.form_type),_cell(r.material_type),_cell(r.specification),
        _cell(r.size),_cell(r.quantity),_cell(L[0]),_cell(L[1]),_cell(W[0]),_cell(W[1]),r.galvanized?"Yes":"","",_pct(r.confidence)].join(","));
    });
    return out.join("\n");
  }
  function recomputeCsv(R){ try{ R.import_csv=buildImportCsvJS(R.rows); }catch(e){} }
  function editQty(idx, val){ const R=loadResult(); if(!R.rows||!R.rows[idx]) return; R.rows[idx].quantity=Math.max(0,Number(val)||0); recomputeCsv(R); saveResult(R); render(); }
  function removeRow(idx){ const R=loadResult(); if(!R.rows||!R.rows[idx]) return; R.rows.splice(idx,1); recomputeCsv(R); saveResult(R); render(); }

  // Download the (resolved/edited) BOM CSV — use it in the existing BOM import flow today.
  function download(name,text){ const b=new Blob([text||""],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},2000); }
  function downloadBom(){ const R=loadResult(); download("takeoff-bom-"+(params.project_id||"project")+".csv", R.import_csv); }

  function setBusy(msg, cls){ const b=document.getElementById("busy"); if(!b) return; b.className="busy show"+(cls?(" "+cls):""); b.innerHTML=msg; }
  function clearBusy(delay){ setTimeout(function(){ const b=document.getElementById("busy"); if(b) b.className="busy"; }, delay||0); }

  function doRevise(){
    const t=document.getElementById("aiInput").value.trim();
    if(!t){ const e=document.getElementById("aiEcho"); if(e) e.textContent="Type an instruction first."; return; }
    revise(t, {});
  }
  // Per-conflict one-click: apply the AI's recommendation, and remove that conflict deterministically.
  function applyConflict(i){
    const c=CONFLICTS[i]; if(!c) return;
    revise('Resolve the conflict on "'+(c.topic||"")+'": '+(c.recommendation||"use the specification")+
      '. Update the affected BOM rows accordingly. Do not change anything else.', { removeConflict:i });
  }

  // A synopsis section is kept from the revise ONLY if it came back populated; otherwise the original is
  // preserved (the model sometimes omits unchanged sections on a small edit — never let them vanish).
  function _has(v){ return v && (Array.isArray(v) ? v.length>0 : (typeof v==="object" ? Object.values(v).some(function(x){return Array.isArray(x)?x.length:x;}) : true)); }
  function mergeResult(cur, data, opts){
    const os=cur.synopsis||{}, rs=data.synopsis||{};
    let conflicts;
    if(opts.removeConflict!=null && Array.isArray(os.conflicts)){
      conflicts = os.conflicts.filter(function(_,i){ return i!==opts.removeConflict; }); // deterministic removal
    } else {
      conflicts = (rs.conflicts!==undefined) ? rs.conflicts : (os.conflicts||[]);
    }
    const syn={
      project:       _has(rs.project)?rs.project:os.project,
      scope_of_work: _has(rs.scope_of_work)?rs.scope_of_work:os.scope_of_work,
      decisions:     _has(rs.decisions)?rs.decisions:os.decisions,
      gaps:          _has(rs.gaps)?rs.gaps:os.gaps,
      conflicts:     conflicts,
      compliance:    _has(rs.compliance)?rs.compliance:os.compliance,
      totals:        _has(rs.totals)?rs.totals:os.totals,
      confidence:    _has(rs.confidence)?rs.confidence:os.confidence,
    };
    return Object.assign({},cur,{rows:data.rows,synopsis:syn,import_csv:data.import_csv,verify_csv:data.verify_csv});
  }

  // The 3c revise loop — global status bar + button locking so it's obvious something is happening.
  async function revise(instruction, opts){
    opts = opts || {};
    if(window.__revising) return;
    window.__revising = true;
    document.querySelectorAll(".applybtn,#reviseBtn").forEach(function(b){ b.disabled=true; });
    let secs=0;
    const fmt=function(){ const m=Math.floor(secs/60), s=secs%60; return m+":"+(s<10?"0":"")+s; };
    const msg=function(){ return "&#10227; Revising your take-off… "+fmt()+" &nbsp;·&nbsp; large projects can take 1–2 min — please wait, don't close"; };
    setBusy(msg());
    const tick=setInterval(function(){ secs++; setBusy(msg()); }, 1000);
    const stop=function(){ clearInterval(tick); window.__revising=false; };
    const reenable=function(){ document.querySelectorAll(".applybtn,#reviseBtn").forEach(function(b){ b.disabled=false; }); };
    const cur=loadResult();
    try{
      const r=await fetch(RAILWAY_URL+"/api/takeoff/revise",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({project_id:params.project_id,manufacturer_id:params.manufacturer_id,
          instruction:instruction,model:"sonnet",current:{rows:cur.rows,synopsis:cur.synopsis}})});
      const data=await r.json();
      if(!r.ok||data.ok===false){
        stop(); reenable();
        const m=String(data.error||("HTTP "+r.status));
        const friendly = m.indexOf("rate_limit")>-1 || m.indexOf("429")>-1
          ? "Anthropic rate limit hit — wait ~60s and try again (or raise your usage tier)."
          : esc(m);
        setBusy("⚠ Revise failed: "+friendly,"err"); clearBusy(8000); return;
      }
      const merged=mergeResult(cur, data, opts);
      saveResult(merged);
      stop();
      render(); // rebuilds the page (re-enables the buttons)
      window.scrollTo({top:0,behavior:"smooth"});
      const what = (data.notes && String(data.notes).trim()) ? esc(data.notes) : "package updated";
      setBusy("✓ "+what+" &nbsp;·&nbsp; "+fmt()+", $"+(data.cost_usd!=null?data.cost_usd:"?"),"ok"); clearBusy(9000);
    }catch(e){
      stop(); reenable();
      setBusy("⚠ Network error: "+esc(e.message),"err"); clearBusy(8000);
    }
  }

  // ---- 3a Zoho write (BOM → staging) -----------------------------------------
  // Commit via Railway — the widget runs standalone (no Creator SDK context), so the Zoho
  // write (create record → upload CSV → set Run_Import) happens server-side using the app's OAuth.
  async function submitToZoho(importCsv, proj, mfg){
    const r=await fetch(RAILWAY_URL+"/api/takeoff/commit",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project_id:proj,manufacturer_id:mfg,import_csv:importCsv})});
    const data=await r.json();
    if(!r.ok||data.ok===false) throw new Error(data.error||("HTTP "+r.status));
    return data.import_id;
  }
  // Capture this shop's decisions so future take-offs pre-apply their preferences (Tier-3 learning).
  function captureLearning(){
    try{
      if(!params.manufacturer_id) return;
      const R=loadResult();
      const ptype=(R.synopsis && R.synopsis.project && R.synopsis.project.type)||"";
      const corrections=DECISIONS.filter(function(d){return d.sel;}).map(function(d){
        return { context:d.item, ai_value:d.rec||"", human_value:d.sel, source:"decision" };
      });
      if(!corrections.length) return;
      fetch(RAILWAY_URL+"/api/takeoff/learn",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ manufacturer_id:params.manufacturer_id, project_type:ptype, corrections:corrections })}).catch(function(){});
    }catch(e){}
  }

  async function approve(){
    const R=loadResult();
    const ap=document.getElementById("approve"); ap.disabled=true;
    const c=document.getElementById("commit"); c.style.display="block";
    const picks=DECISIONS.map(d=>'• '+esc(d.item)+'  →  <b>'+esc(d.sel)+'</b>').join("<br>")||"(none)";
    if(!R.__demo && R.import_csv && params.project_id){
      c.innerHTML='<span class="spin"></span>Committing BOM to staging…';
      try{
        const recId = await submitToZoho(R.import_csv, params.project_id, params.manufacturer_id);
        captureLearning();  // store this shop's decisions for future take-offs (best-effort)
        if(Z.REVIEW_PAGE){
          c.innerHTML='<b>✓ BOM sent to staging.</b> Opening the review…'+commitList(picks);
          const url=Z.REVIEW_PAGE+"?import_id="+encodeURIComponent(recId||"")+"&project_id="+encodeURIComponent(params.project_id)+"&client_id="+encodeURIComponent(params.manufacturer_id||"");
          setTimeout(()=>window.open(url,"_top"),1200);
        } else {
          c.innerHTML='<b>✓ BOM sent to staging review.</b> Open your project’s BOM staging to review &amp; Import Approved Rows.'+commitList(picks);
        }
      }catch(e){ ap.disabled=false; c.innerHTML='<b style="color:var(--red)">Commit failed:</b> '+esc(e.message); }
    } else {
      // standalone / SAMPLE — show what WOULD commit
      c.innerHTML='<b>✓ Approved — this is what would commit:</b>'+commitList(picks)+
        '<div class="src" style="margin-top:8px">(No Zoho SDK / no project_id — design preview, nothing written.)</div>';
    }
    c.scrollIntoView({behavior:"smooth"});
  }
  function commitList(picks){
    return '<ul>'+
      '<li><b>BOM</b> → CSV Import Tool → staging review</li>'+
      '<li><b>Buyout</b> → outsource / RFQ subform <span class="src">(WIRE)</span></li>'+
      '<li><b>Scope of Work</b> → project record <span class="src">(WIRE: Save_Scope_Of_Work)</span></li>'+
      '<li><b>Gaps + conflicts</b> → project alerts / verify list <span class="src">(WIRE)</span></li>'+
      '<li><b>Totals + confidence</b> → Takeoff_Log <span class="src">(WIRE)</span></li>'+
      '</ul><div style="margin-top:8px">Decisions recorded:<br>'+picks+'</div>';
  }

  // ---- SAMPLE (Alden) — used when no live result is present -------------------
  const SAMPLE = {
    __demo:true,
    cost_usd:0.91,
    import_csv:"(sample — real result carries the generated CSV here)",
    rows:[
      {form_type:"Beam - W",size:"W12 x 26",specification:"A992",quantity:8,length_ft:24,source_sheet:"S-201",confidence:0.95},
      {form_type:"Beam - W",size:"W8 x 24",specification:"A992",quantity:12,length_ft:6.33,source_sheet:"S-204",confidence:0.92,galvanized:true},
      {form_type:"Angle",size:"L4 x 4 x 1/4",specification:"A36",quantity:22,length_ft:3,source_sheet:"S-205",confidence:0.90},
      {form_type:"Channel - MC",size:"MC8 x 8.5",specification:"A36",quantity:4,length_ft:12,source_sheet:"S-203",confidence:0.62},
      {form_type:"Plate",size:'1/2"',specification:"A36",quantity:6,length_ft:1,width_ft:1,source_sheet:"S-501",confidence:0.55},
      {form_type:"Beam - W",size:"W16 x 40",specification:"A992",quantity:5,length_ft:28,source_sheet:"S-201",confidence:0.88},
      {form_type:"Pipe",size:'6" SCH 80 (XS)',specification:"A53 Gr B",quantity:0,length_ft:0,source_sheet:"C-101",confidence:0.30,note:"GAP — bollard count"},
    ],
    synopsis:{
      project:{name:"Alden Intermediate School",type:"K-12 / institutional",
        sheets_read:["S-101","S-201","S-204","A-220","Spec 05 12 00","Spec 05 50 00"],
        summary:"Structural steel + misc metals for a 2-story addition"},
      scope_of_work:{
        fabricate:["Primary W framing","Lintels (12)","Stair stringers & pans","Embed plates"],
        buyout:["Bar grating + frames","Pipe railings"], by_others:["Precast plank","CIP concrete"],
        send_out:["Hot-dip galv: 12 exterior lintels / shelf angles"]},
      decisions:[
        {id:"d1",item:"4 davit cranes on S-301 — in fab scope?",where:"S-301",
          why_flagged:"Could be our fabrication or a vendor-supplied unit.",options:["Include","Skip"],ai_recommendation:"Skip"},
        {id:"d2",item:"Masonry ledger angle — continuous or clips?",where:"S-204 / Spec 05 50 00",
          why_flagged:"Drawing shows continuous; spec permits clip angles.",options:["Continuous","Clips"],ai_recommendation:"Continuous"},
        {id:"d3",item:"Stainless hardware noted on A-220 — our scope?",where:"A-220",
          why_flagged:"Hardware callout with no supplier assigned.",options:["Yes","No"],ai_recommendation:""},
      ],
      gaps:[
        {item:"Loose lintels — L-schedule not in set",where:"A-601",suggested_action:"Pull arch lintel schedule"},
        {item:"OH coiling door frames",where:"A-220",suggested_action:"Confirm frame sizes"},
        {item:"Bollard count + length",where:"C-101",suggested_action:"Confirm from civil"},
      ],
      conflicts:[
        {topic:"Lintel finish",drawing_says:"prime",spec_says:"galvanize (ext)",recommendation:"Galvanize per 05 50 00 §2.3"},
      ],
      compliance:[
        {topic:"BABA / AIS",note:"Domestic content required — Spec 00 73 00 / 7 CFR 1792"},
        {topic:"Finish",note:"Interior = shop prime · exterior = hot-dip galvanized"},
      ],
      totals:{fab_rows:52,est_weight_lb:2140,gap_count:6,low_conf_count:3},
      confidence:{overall:0.84,scope:0.9,bom:0.82,gaps:0.5},
    },
  };

  // Arriving from the uploader the result is in sessionStorage — mirror it to localStorage
  // (keyed by project) so closing & reopening this page restores it instead of losing the run.
  (function(){ try{ const s=sessionStorage.getItem("takeoff_result"); const k=lsKey(); if(s&&k){ const R=JSON.parse(s); if(sameProj(R)) localStorage.setItem(k,s); } }catch(e){} })();
  // "New take-off" link → back to the uploader for this project
  (function(){ const lk=document.getElementById("newRun"); if(lk && params.project_id){ lk.href="index.html?project_id="+encodeURIComponent(params.project_id)+"&manufacturer_id="+encodeURIComponent(params.manufacturer_id||""); } })();
  (async function init(){
    render();                                  // show local/sample immediately
    if(haveLive()){
      scheduleZohoSave();                      // persist the freshly-arrived take-off to the project
    } else if(params.project_id){
      setSaveInd("loading saved…","var(--mut)");
      try{
        const r=await fetch(RAILWAY_URL+"/api/takeoff/saved/"+encodeURIComponent(params.project_id));
        const d=await r.json();
        if(d.ok && d.found && d.package && Array.isArray(d.package.rows) && d.package.rows.length){
          const R=d.package; R.__project=params.project_id; recomputeCsv(R); window.TAKEOFF_RESULT=R;
          try{ sessionStorage.setItem("takeoff_result",JSON.stringify(R)); const k=lsKey(); if(k) localStorage.setItem(k,JSON.stringify(R)); }catch(e){}
          render(); setSaveInd("💾 loaded from project","var(--grn)");
        } else { setSaveInd("",""); }
      }catch(e){ setSaveInd("",""); }
    }
  })();
</script>
